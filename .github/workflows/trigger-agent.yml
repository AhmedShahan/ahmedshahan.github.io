name: Trigger Agent Pipeline

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger portfolio_agent workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.AGENT_TRIGGER_TOKEN }}" \
            https://api.github.com/repos/ahmedshahan/portfolio_agent/dispatches \
            -d '{"event_type": "frontend-pushed"}'