<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at center, #001100 0%, #000 70%);
            color: #0f0;
            font-family: 'Orbitron', 'Courier New', monospace;
            overflow: hidden;
            animation: backgroundPulse 8s ease-in-out infinite;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, transparent 79px, rgba(0, 255, 0, 0.03) 81px, transparent 82px),
                linear-gradient(rgba(0, 255, 0, 0.03) 50%, transparent 50%);
            background-size: 82px 4px, 100% 4px;
            pointer-events: none;
            animation: scanLines 0.1s linear infinite;
        }
        
        @keyframes scanLines {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        @keyframes backgroundPulse {
            0%, 100% { 
                background: 
                    radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                    radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.3) 0%, transparent 50%),
                    radial-gradient(ellipse at center, #001100 0%, #000 70%);
            }
            50% { 
                background: 
                    radial-gradient(circle at 30% 60%, rgba(120, 119, 198, 0.4) 0%, transparent 50%),
                    radial-gradient(circle at 70% 30%, rgba(255, 119, 198, 0.4) 0%, transparent 50%),
                    radial-gradient(circle at 50% 70%, rgba(120, 219, 255, 0.4) 0%, transparent 50%),
                    radial-gradient(ellipse at center, #002200 0%, #000 60%);
            }
        }

        .container {
            text-align: center;
            position: relative;
        }

        .rounded-rect {
            position: relative;
            border: 3px solid #0f0;
            border-radius: 20px;
            background: rgba(0, 255, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 
                0 0 20px rgba(0, 255, 0, 0.4),
                inset 0 0 20px rgba(0, 255, 0, 0.1),
                0 0 40px rgba(0, 255, 0, 0.2),
                0 0 80px rgba(0, 255, 0, 0.1);
            backdrop-filter: blur(10px);
            transform: scale(0.9);
            animation: initialGlow 2s ease-out forwards, borderPulse 3s ease-in-out infinite;
        }
        
        .rounded-rect::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #0f0, #00ff88, #0f0, #88ff00, #0f0);
            background-size: 400% 400%;
            border-radius: 25px;
            z-index: -1;
            animation: gradientShift 4s ease infinite;
            opacity: 0.6;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes borderPulse {
            0%, 100% { 
                border-color: #0f0;
                box-shadow: 
                    0 0 20px rgba(0, 255, 0, 0.4),
                    inset 0 0 20px rgba(0, 255, 0, 0.1),
                    0 0 40px rgba(0, 255, 0, 0.2),
                    0 0 80px rgba(0, 255, 0, 0.1);
            }
            50% { 
                border-color: #00ff88;
                box-shadow: 
                    0 0 30px rgba(0, 255, 136, 0.6),
                    inset 0 0 30px rgba(0, 255, 136, 0.2),
                    0 0 60px rgba(0, 255, 136, 0.3),
                    0 0 120px rgba(0, 255, 136, 0.2);
            }
        }

        @keyframes initialGlow {
            0% {
                transform: scale(0.5) rotate(-180deg);
                opacity: 0;
                box-shadow: 0 0 0 rgba(0, 255, 0, 0);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
                box-shadow: 
                    0 0 20px rgba(0, 255, 0, 0.4),
                    inset 0 0 20px rgba(0, 255, 0, 0.1);
            }
        }

        .phase-1 {
            width: 200px;
            height: 80px;
        }

        .phase-2 {
            width: 700px;
            height: 140px;
            border-radius: 35px;
        }

        .phase-3 {
            width: 180px;
            height: 60px;
            border-radius: 30px;
        }

        .text {
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 30px #0f0;
            opacity: 0;
            animation: 
                fadeIn 0.8s ease-out 0.5s forwards,
                textGlow 3s ease-in-out infinite,
                textFloat 4s ease-in-out infinite;
            letter-spacing: 2px;
        }
        
        @keyframes textFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .typing-text {
            font-size: 42px;
            font-weight: 900;
            text-shadow: 
                0 0 15px #0f0, 
                0 0 25px #0f0, 
                0 0 35px #0f0,
                0 0 45px #00ff88;
            opacity: 0;
            white-space: nowrap;
            overflow: hidden;
            border-right: 4px solid #0f0;
            animation: 
                typing 3.5s steps(40, end) 0.3s forwards, 
                blink 1s infinite,
                textGlow 2s ease-in-out infinite,
                textWave 3s ease-in-out infinite;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #0f0, #00ff88, #0f0);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @keyframes textWave {
            0%, 100% { 
                background-position: 0% 50%;
                transform: scale(1);
            }
            50% { 
                background-position: 100% 50%;
                transform: scale(1.02);
            }
        }

        .continue-text {
            font-size: 20px;
            font-weight: 900;
            text-shadow: 
                0 0 8px #0f0,
                0 0 16px #0f0,
                0 0 24px #00ff88;
            opacity: 0;
            animation: 
                fadeIn 0.8s ease-out forwards, 
                pulse 2s ease-in-out infinite,
                rainbow 4s linear infinite;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            background: linear-gradient(45deg, #0f0, #00ff88, #88ff00, #0f0);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .continue-text:hover {
            transform: scale(1.2) rotate(2deg);
            text-shadow: 
                0 0 20px #0f0,
                0 0 30px #00ff88,
                0 0 40px #88ff00;
            animation: 
                fadeIn 0.8s ease-out forwards, 
                pulse 0.5s ease-in-out infinite,
                rainbow 2s linear infinite,
                shake 0.5s ease-in-out infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: scale(1.2) rotate(2deg) translateX(0); }
            25% { transform: scale(1.2) rotate(2deg) translateX(-2px); }
            75% { transform: scale(1.2) rotate(2deg) translateX(2px); }
        }

        .continue-text::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -20px;
            right: -20px;
            bottom: -10px;
            border: 1px solid transparent;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .continue-text:hover::before {
            border-color: #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        @keyframes textGlow {
            0%, 100% { 
                text-shadow: 0 0 10px #0f0;
            }
            50% { 
                text-shadow: 0 0 20px #0f0, 0 0 30px #0f0;
            }
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.8);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }

        @keyframes typing {
            from { 
                width: 0; 
                opacity: 1; 
            }
            to { 
                width: 100%; 
                opacity: 1; 
            }
        }

        @keyframes blink {
            0%, 50% { border-color: #0f0; }
            51%, 100% { border-color: transparent; }
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 1; 
                transform: scale(1);
            }
            50% { 
                opacity: 0.7; 
                transform: scale(1.05);
            }
        }

        @keyframes glitch {
            0% { 
                text-shadow: 0 0 10px #0f0;
                transform: translate(0) scale(1);
            }
            10% { 
                text-shadow: 3px 3px #ff0000, -3px -3px #0000ff;
                transform: translate(-2px, 2px) scale(1.02);
            }
            20% { 
                text-shadow: -3px -3px #ff0000, 3px 3px #0000ff;
                transform: translate(2px, -2px) scale(0.98);
            }
            30% { 
                text-shadow: 3px -3px #ff0000, -3px 3px #0000ff;
                transform: translate(-2px, -2px) scale(1.01);
            }
            40% { 
                text-shadow: -3px 3px #ff0000, 3px -3px #0000ff;
                transform: translate(2px, 2px) scale(0.99);
            }
            50% { 
                text-shadow: 0 0 10px #0f0;
                transform: translate(0) scale(1);
            }
            60% { 
                text-shadow: 2px 2px #ff0000, -2px -2px #0000ff;
                transform: translate(-1px, 1px) scale(1.01);
            }
            70% { 
                text-shadow: -2px -2px #ff0000, 2px 2px #0000ff;
                transform: translate(1px, -1px) scale(0.99);
            }
            80% { 
                text-shadow: 2px -2px #ff0000, -2px 2px #0000ff;
                transform: translate(-1px, -1px) scale(1.005);
            }
            90% { 
                text-shadow: -2px 2px #ff0000, 2px -2px #0000ff;
                transform: translate(1px, 1px) scale(0.995);
            }
            100% { 
                text-shadow: 0 0 10px #0f0;
                transform: translate(0) scale(1);
            }
        }

        .glitch-effect {
            animation: glitch 0.3s ease-in-out;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #0f0 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            animation: particle-float 3s ease-in-out infinite;
            box-shadow: 0 0 6px #0f0;
        }
        
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.3) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }
        
        .orb-1 {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .orb-2 {
            width: 60px;
            height: 60px;
            top: 70%;
            right: 15%;
            animation-delay: 2s;
        }
        
        .orb-3 {
            width: 100px;
            height: 100px;
            bottom: 30%;
            left: 20%;
            animation-delay: 4s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px) scale(1);
                opacity: 0.3;
            }
            33% {
                transform: translateY(-20px) translateX(10px) scale(1.1);
                opacity: 0.6;
            }
            66% {
                transform: translateY(10px) translateX(-15px) scale(0.9);
                opacity: 0.4;
            }
        }

        @keyframes particle-float {
            0% {
                opacity: 0;
                transform: translateY(0) rotate(0deg) scale(0.5);
            }
            10% {
                opacity: 1;
                transform: translateY(-20px) rotate(36deg) scale(1);
            }
            90% {
                opacity: 1;
                transform: translateY(-80px) rotate(324deg) scale(1.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) rotate(360deg) scale(0.5);
            }
        }

        .matrix-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .matrix-char {
            position: absolute;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            opacity: 0;
            animation: matrixFall 4s linear infinite;
        }

        @keyframes matrixFall {
            0% {
                opacity: 0;
                transform: translateY(-100vh);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(100vh);
            }
        }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="matrix-rain"></div>
    
    <!-- Floating Orbs -->
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>
    
    <div class="container">
        <div class="rounded-rect phase-1" id="mainRect">
            <div class="text" id="mainText">Welcome</div>
        </div>
    </div>

    <script>
        const mainRect = document.getElementById('mainRect');
        const mainText = document.getElementById('mainText');
        let currentPhase = 1;

        // Create floating particles
        function createParticles() {
            const particles = document.querySelector('.particles');
            for (let i = 0; i < 120; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                // Add random colors
                const colors = ['#0f0', '#00ff88', '#88ff00', '#00ffff'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.background = `radial-gradient(circle, ${randomColor} 0%, transparent 70%)`;
                particle.style.boxShadow = `0 0 6px ${randomColor}`;
                
                particles.appendChild(particle);
            }
        }
        
        // Mouse interaction effects
        function addMouseEffects() {
            document.addEventListener('mousemove', (e) => {
                const mouseX = e.clientX / window.innerWidth;
                const mouseY = e.clientY / window.innerHeight;
                
                // Move floating orbs slightly based on mouse position
                const orbs = document.querySelectorAll('.floating-orb');
                orbs.forEach((orb, index) => {
                    const speed = (index + 1) * 0.02;
                    const x = (mouseX - 0.5) * 20 * speed;
                    const y = (mouseY - 0.5) * 20 * speed;
                    orb.style.transform += ` translate(${x}px, ${y}px)`;
                });
                
                // Create temporary mouse trail particles
                if (Math.random() > 0.8) {
                    createMouseParticle(e.clientX, e.clientY);
                }
            });
        }
        
        // Create mouse trail particle
        function createMouseParticle(x, y) {
            const particle = document.createElement('div');
            particle.style.position = 'fixed';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.width = '4px';
            particle.style.height = '4px';
            particle.style.background = '#0f0';
            particle.style.borderRadius = '50%';
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '1000';
            particle.style.boxShadow = '0 0 10px #0f0';
            document.body.appendChild(particle);
            
            // Animate and remove
            particle.animate([
                { opacity: 1, transform: 'scale(1)' },
                { opacity: 0, transform: 'scale(0) translateY(-20px)' }
            ], {
                duration: 1000,
                easing: 'ease-out'
            }).onfinish = () => particle.remove();
        }

        // Create matrix rain effect
        function createMatrixRain() {
            const matrix = document.querySelector('.matrix-rain');
            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            
            for (let i = 0; i < 30; i++) {
                const char = document.createElement('div');
                char.className = 'matrix-char';
                char.textContent = chars[Math.floor(Math.random() * chars.length)];
                char.style.left = Math.random() * 100 + '%';
                char.style.animationDelay = Math.random() * 4 + 's';
                char.style.animationDuration = (Math.random() * 3 + 3) + 's';
                matrix.appendChild(char);
            }
        }

        // Add random glitch effect
        function addGlitchEffect() {
            if (Math.random() > 0.8) {
                mainText.classList.add('glitch-effect');
                setTimeout(() => {
                    mainText.classList.remove('glitch-effect');
                }, 400);
            }
        }

        // Add screen shake effect
        function addScreenShake() {
            document.body.style.animation = 'none';
            document.body.style.transform = 'translate(' + 
                (Math.random() * 4 - 2) + 'px, ' + 
                (Math.random() * 4 - 2) + 'px)';
            
            setTimeout(() => {
                document.body.style.transform = 'translate(0, 0)';
                document.body.style.animation = 'backgroundPulse 8s ease-in-out infinite';
            }, 100);
        }

        // Phase transitions
        function nextPhase() {
            if (currentPhase === 1) {
                // Phase 1 to Phase 2: Expand and show portfolio text
                addScreenShake();
                mainRect.style.transform = 'scale(1.05)';
                
                setTimeout(() => {
                    mainRect.classList.remove('phase-1');
                    mainRect.classList.add('phase-2');
                    mainRect.style.transform = 'scale(1)';
                }, 200);
                
                setTimeout(() => {
                    mainText.style.opacity = '0';
                    mainText.style.transform = 'translateY(-20px)';
                    
                    setTimeout(() => {
                        mainText.innerHTML = '';
                        mainText.className = 'typing-text';
                        mainText.textContent = 'Portfolio of Shahan Ahmed';
                        currentPhase = 2;
                        
                        // Move to phase 3 after typing animation
                        setTimeout(() => {
                            nextPhase();
                        }, 4500);
                    }, 300);
                }, 1000);
                
            } else if (currentPhase === 2) {
                // Phase 2 to Phase 3: Shrink and show continue
                addScreenShake();
                mainRect.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    mainRect.classList.remove('phase-2');
                    mainRect.classList.add('phase-3');
                    mainRect.style.transform = 'scale(1)';
                }, 200);
                
                setTimeout(() => {
                    mainText.style.opacity = '0';
                    mainText.style.transform = 'translateY(-20px)';
                    
                    setTimeout(() => {
                        mainText.innerHTML = '';
                        mainText.className = 'continue-text';
                        mainText.textContent = 'Continue';
                        currentPhase = 3;
                        
                        // Add click handler
                        mainText.addEventListener('click', () => {
                            // Add exit animation
                            mainRect.style.transform = 'scale(0) rotate(360deg)';
                            mainRect.style.opacity = '0';
                            mainRect.style.filter = 'blur(10px)';
                            
                            // Add final screen effect
                            document.body.style.animation = 'none';
                            document.body.style.background = 'radial-gradient(circle, #0f0 0%, #000 100%)';
                            
                            setTimeout(() => {
                                document.body.style.opacity = '0';
                                setTimeout(() => {
                                    window.location.href = '1.0_first.html';
                                }, 300);
                            }, 400);
                        });
                    }, 300);
                }, 1000);
            }
        }

        // Initialize
        createParticles();
        createMatrixRain();
        addMouseEffects();
        
        // Add periodic effects
        setInterval(addGlitchEffect, 1500);
        setInterval(addScreenShake, 5000);
        
        // Add dynamic color changes to main rect
        setInterval(() => {
            const mainRect = document.getElementById('mainRect');
            const colors = ['#0f0', '#00ff88', '#88ff00', '#00ffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            mainRect.style.borderColor = randomColor;
        }, 3000);
        
        // Start the sequence
        setTimeout(() => {
            nextPhase();
        }, 2500);

        // Add keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                if (currentPhase === 3) {
                    mainText.click();
                }
            }
        });
    </script>
</body>
</html>
